name: busana_prima
description: Busana Prima - Fashion Try-On & Booking Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  google_sign_in: ^6.2.2

  # UI Components
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Camera & ML
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.12.0
  sensors_plus: ^6.1.1
  image: ^4.3.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.0
  file_picker: ^10.1.2

  # Voice & Video Calling (ZegoCloud)
  zego_uikit_prebuilt_call: ^4.17.0

  # Session Management & Security
  flutter_secure_storage: ^10.0.0
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.0
  uuid: ^4.0.0
  encrypt: ^5.0.0
  crypto: ^3.0.0
  firebase_messaging: ^15.0.0
  shared_preferences: ^2.2.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
